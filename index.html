const HEALTHY_WORDS   = ['grilled','steamed','salad','vegetable','boiled','baked','fresh','lean','broth','spinach','kale','quinoa'];

async function fetchJson(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('Recipe service unavailable');
  return res.json();
}

function pickRandomLetters(n) {
  const letters = 'abcdefghijklmnoprstw'.split(''); // letters TheMealDB reliably has entries for
  const out = new Set();
  while (out.size < n && out.size < letters.length) out.add(letters[Math.floor(Math.random()*letters.length)]);
  return [...out];
}

function mealIngredients(meal) {
  const out = [];
  for (let i=1;i<=20;i++){
    const name = meal[`strIngredient${i}`];
    const measure = meal[`strMeasure${i}`];
    if (name && name.trim()) out.push({ name: name.trim(), measure: (measure||'').trim() });
  }
  return out;
}
function mealInstructions(meal) {
  return (meal.strInstructions||'').split(/\r?\n+/).map(s=>s.trim()).filter(Boolean);
}
function classifyDiet(ingredients) {
  const names = ingredients.map(i=>i.name.toLowerCase());
  if (names.some(n => EXCLUDE_WORDS.some(w => n.includes(w)))) return 'Non-Vegetarian';
  if (names.some(n => DAIRY_WORDS.some(w => n.includes(w)))) return 'Vegetarian';
  return 'Vegan';
}
function spiceScore(ingredients, instructions) {
  const text = (ingredients.map(i=>i.name).join(' ') + ' ' + instructions.join(' ')).toLowerCase();
  let hits = 0;
  SPICY_WORDS.forEach(w => { if (text.includes(w)) hits++; });
  return Math.min(5, Math.max(1, hits===0?1:hits+1));
}
function healthScoreOf(ingredients, instructions) {
  const text = (ingredients.map(i=>i.name).join(' ') + ' ' + instructions.join(' ')).toLowerCase();
  let score = 5;
  UNHEALTHY_WORDS.forEach(w => { if (text.includes(w)) score -= 0.8; });
  HEALTHY_WORDS.forEach(w => { if (text.includes(w)) score += 0.8; });
  return Math.min(10, Math.max(1, Math.round(score)));
}
function guessPrepTime(steps) {
  if (steps.length <= 4) return '20 mins';
  if (steps.length <= 8) return '35 mins';
  return '50 mins';
}
function nutritionLine(h) {
  return h>=8 ? 'Light & veggie-forward' : h>=6 ? 'Balanced nutrition' : h>=4 ? 'Hearty comfort food' : 'Indulgent treat';
}
function computeMissing(ingredients, selectedNames) {
  const lowerSel = selectedNames.map(n=>n.toLowerCase());
  return ingredients.map(i=>i.name).filter(name => {
    const ln = name.toLowerCase();
    if (STAPLES.some(s=>ln.includes(s))) return false;
    return !lowerSel.some(s => ln.includes(s) || s.includes(ln));
  });
}

async function buildCandidatePool(ingredients, filters) {
  const fullMeals = new Map();
  const idOnly = new Set();

  if (filters.cuisine !== 'Any') {
    const d = await fetchJson(`${MEALDB}/filter.php?a=${encodeURIComponent(filters.cuisine)}`).catch(()=>({meals:null}));
    (d.meals||[]).forEach(m => idOnly.add(m.idMeal));
  }

  const catMap = { Breakfast:'Breakfast', Dessert:'Dessert' };
  if (catMap[filters.mealType]) {
    const d = await fetchJson(`${MEALDB}/filter.php?c=${catMap[filters.mealType]}`).catch(()=>({meals:null}));
    (d.meals||[]).forEach(m => idOnly.add(m.idMeal));
  }

  const ingList = [...ingredients].slice(0,3);
  await Promise.all(ingList.map(async ing => {
    const d = await fetchJson(`${MEALDB}/filter.php?i=${encodeURIComponent(ing)}`).catch(()=>({meals:null}));
    (d.meals||[]).forEach(m => idOnly.add(m.idMeal));
  }));

  const letters = pickRandomLetters(4);
  const letterResults = await Promise.all(
    letters.map(l => fetchJson(`${MEALDB}/search.php?f=${l}`).then(d=>d.meals||[]).catch(()=>[]))
  );
  letterResults.flat().forEach(m => fullMeals.set(m.idMeal, m));

  const needLookup = [...idOnly].filter(id => !fullMeals.has(id)).slice(0,24);
  await Promise.all(needLookup.map(async id => {
    const d = await fetchJson(`${MEALDB}/lookup.php?i=${id}`).catch(()=>({meals:null}));
    if (d.meals && d.meals[0]) fullMeals.set(id, d.meals[0]);
  }));

  // Always merge in the curated Indian dataset — guarantees solid Indian coverage
  // even if TheMealDB's own Indian listings are thin or unreachable.
  INDIAN_RECIPES.forEach(m => fullMeals.set(m.idMeal, m));

  if (fullMeals.size < 10) {
    const extra = await Promise.all(Array.from({length:8}).map(() =>
      fetchJson(`${MEALDB}/random.php`).then(d=>d.meals && d.meals[0]).catch(()=>null)
    ));
    extra.filter(Boolean).forEach(m => fullMeals.set(m.idMeal, m));
  }

  return [...fullMeals.values()];
}

function scoreMeal(meal, ingNames, filters, history) {
  const ingredients = mealIngredients(meal);
  const instructions = mealInstructions(meal);
  const diet = classifyDiet(ingredients);
  const spice = spiceScore(ingredients, instructions);
  const health = healthScoreOf(ingredients, instructions);

  let score = 0;
  const lowerSel = ingNames.map(n=>n.toLowerCase());
  const matched = ingredients.filter(i => lowerSel.some(s => i.name.toLowerCase().includes(s) || s.includes(i.name.toLowerCase())));
  if (lowerSel.length) score += (matched.length / lowerSel.length) * 40;

  if (filters.cuisine !== 'Any') score += meal.strArea === filters.cuisine ? 15 : 0;
  if (filters.mealType === 'Breakfast') score += meal.strCategory === 'Breakfast' ? 15 : -5;
  if (filters.mealType === 'Dessert')   score += meal.strCategory === 'Dessert'   ? 15 : -5;

  const desiredSpice = filters.ageGroup === 'Kids (3-10)' ? Math.min(filters.spiceLevel,2) : filters.spiceLevel;
  score += (5 - Math.abs(spice - desiredSpice)) * 3;
  score += (10 - Math.abs(health - filters.health)) * 1.5;

  const likedNames    = history.flatMap(h=>h.liked||[]);
  const dislikedNames = history.flatMap(h=>h.disliked||[]);
  if (likedNames.includes(meal.strMeal)) score += 10;
  if (dislikedNames.includes(meal.strMeal)) score -= 30;

  return { score, diet, spice, health, ingredients, instructions, matched, meal };
}

function buildWhy(x, filters) {
  const bits = [];
  if (x.matched.length) bits.push(`uses the ${x.matched.slice(0,3).map(i=>i.name).join(', ')} you already have`);
  if (filters.cuisine !== 'Any') bits.push(`brings ${filters.cuisine} flavor`);
  bits.push(`fits your ${filters.diet.toLowerCase()} preference`);
  const base = `A ${today()} pick`;
  return bits.length ? `${base} that ${bits.join(' and ')}.` : `${base} worth trying.`;
}

function toRecipeShape(x, filters) {
  const m = x.meal;
  return {
    name: m.strMeal,
    description: `A ${m.strArea} ${m.strCategory.toLowerCase()} favorite, ready in ${guessPrepTime(x.instructions)}.`,
    cuisine: m.strArea,
    prepTime: guessPrepTime(x.instructions),
    servings: 2,
    image: m.strMealThumb,
    tags: [x.diet, x.spice>=4 ? '🌶 Spicy' : x.spice<=1 ? 'Mild' : null].filter(Boolean),
    ingredients: x.ingredients.map(i => `${i.measure ? i.measure+' ' : ''}${i.name}`),
    instructions: x.instructions,
    nutritionHighlights: nutritionLine(x.health),
    whyToday: buildWhy(x, filters),
  };
}
function toGroceryShape(x) {
  const m = x.meal;
  return {
    name: m.strMeal,
    description: `${m.strArea} ${m.strCategory.toLowerCase()} — just ${x.missing.length} item${x.missing.length===1?'':'s'} away.`,
    image: m.strMealThumb,
    missingIngredients: x.missing,
    prepTime: guessPrepTime(x.instructions),
  };
}

async function generateSuggestions(ingredients, filters, history) {
  const pool = await buildCandidatePool(ingredients, filters);
  if (!pool.length) throw new Error('Could not reach the recipe service. Check your connection and try again.');

  const ingNames = [...ingredients];
  let scored = pool.map(meal => scoreMeal(meal, ingNames, filters, history));

  // App is vegetarian/vegan only — always exclude meat, fish and eggs.
  scored = scored.filter(x => x.diet !== 'Non-Vegetarian');
  if (filters.diet === 'Vegan') scored = scored.filter(x => x.diet === 'Vegan');

  if (!scored.length) throw new Error('No recipes matched those filters — try loosening cuisine or ingredients.');

  scored.sort((a,b)=>b.score-a.score);
  const top = scored.slice(0,5);
  const recipes = top.map(x => toRecipeShape(x, filters));

  const usedIds = new Set(top.map(x=>x.meal.idMeal));
  const groceryCandidates = scored
    .filter(x => !usedIds.has(x.meal.idMeal))
    .map(x => ({ ...x, missing: computeMissing(x.ingredients, ingNames) }))
    .filter(x => ingNames.length>0 ? (x.missing.length>0 && x.missing.length<=4) : true)
    .sort((a,b)=> a.missing.length - b.missing.length || b.score - a.score);

  const grocerySuggestions = groceryCandidates.slice(0,3).map(toGroceryShape);
  return { recipes, grocerySuggestions };
}

  const [tab,         setTab]         = useState('suggest');

  useEffect(() => save('bb_ing',      [...ingredients]),[ingredients]);
  useEffect(() => save('bb_filters',  filters),       [filters]);
  useEffect(() => save('bb_bookmarks',[...bookmarks]), [bookmarks]);
  useEffect(() => save('bb_feedback', feedback),      [feedback]);
  useEffect(() => save('bb_history',  history),       [history]);

  const toggleIng = useCallback(item => setIngredients(p => {
    const n = new Set(p); n.has(item) ? n.delete(item) : n.add(item); return n;
  }), []);
  const toggleBookmark = useCallback(name => setBookmarks(p => {
    const n = new Set(p); n.has(name) ? n.delete(name) : n.add(name); return n;
  }), []);
  const handleFb = useCallback((name, type) => setFeedback(p => ({
    ...p, [name]: p[name]===type ? null : type,
  })), []);

  const generate = async () => {
    setLoading(true); setError('');
    try {
      const liked    = Object.entries(feedback).filter(([,v])=>v==='up').map(([k])=>k);
      const disliked = Object.entries(feedback).filter(([,v])=>v==='down').map(([k])=>k);
      const hist     = [...history.slice(-19), { date:today(), liked, disliked }];
      setHistory(hist);
      const result = await generateSuggestions(ingredients, filters, hist);
      setRecipes(result.recipes||[]);
      setGrocery(result.grocerySuggestions||[]);
      setTab('suggest');
    } catch(e) {
      setError(e.message || 'Something went wrong fetching recipes. Try again.');
    } finally {
      setLoading(false);
    }
  };

  const allRecipes = [...recipes, ...grocery];
  const savedList  = [...bookmarks].map(n => allRecipes.find(r=>r.name===n)).filter(Boolean);

  const headerBtn = (active, label, onClick) => html`<button onClick=${onClick} style=${{
    background: active ? C.sage : 'transparent',
    color: active ? 'white' : C.bark,
    border: 'none', padding: '7px 18px', borderRadius: 99,
    cursor: 'pointer', fontSize: F.sm, fontWeight: 500, transition: 'all .12s',
  }}>${label}</button>`;

  return html`<div style=${{ minHeight:'100vh', background:C.cream }}>

    <header style=${{ background:'white', borderBottom:`1px solid ${C.border}`,
      position:'sticky', top:0, zIndex:40 }}>
      <div style=${{ maxWidth:1200, margin:'0 auto', padding:'16px 20px',
        display:'flex', flexWrap:'wrap', alignItems:'center', justifyContent:'space-between', gap:12 }}>
        <div>
          <h1 class="font-serif" style=${{ fontSize:F.xxl, fontWeight:700, color:C.charcoal, margin:'0 0 3px' }}>
            Bite<span style=${{ color:C.sage }}>Builder</span>
          </h1>
          <p style=${{ fontSize:F.sm, color:C.bark, margin:0 }}>${today()} · personalized meal ideas · free recipe data, no API key</p>
        </div>
        <div style=${{ background:C.parchment, borderRadius:99, padding:4, display:'flex', gap:4 }}>
          ${headerBtn(tab==='suggest', '🍽️ Suggestions', ()=>setTab('suggest'))}
          ${headerBtn(tab==='saved',   `🔖 Saved${bookmarks.size?` (${bookmarks.size})`:''}`, ()=>setTab('saved'))}
        </div>
      </div>
    </header>

    <div style=${{ maxWidth:1200, margin:'0 auto', padding:'24px 20px' }}>

      ${tab==='suggest' && html`
        <div class="layout" style=${{ display:'grid', gridTemplateColumns:'290px 1fr', gap:24, alignItems:'start' }}>

          <div class="sidebar" style=${{ position:'sticky', top:86, maxHeight:'calc(100vh - 106px)', overflowY:'auto', paddingRight:4 }}>
            <div style=${{ display:'flex', flexDirection:'column', gap:16 }}>
              <${FilterPanel} f=${filters} setF=${setFilters} />
              <${IngredientPicker} selected=${ingredients} toggle=${toggleIng} />
              <button class=${loading ? '' : 'cta-btn'} onClick=${generate} disabled=${loading} style=${{
                background: loading ? '#C7C7CC' : undefined,
                color: 'white', border: 'none',
                width: '100%', padding: '16px', borderRadius: 16,
                fontSize: F.md, fontWeight: 700, cursor: loading ? 'not-allowed' : 'pointer',
                boxShadow: loading ? 'none' : '0 6px 16px rgba(62,151,96,.35)',
                letterSpacing: '0.01em',
              }}>
                ${loading
                  ? html`<span style=${{ display:'flex', alignItems:'center', justifyContent:'center', gap:8 }}>
                      <span class="spin">⟳</span> Finding recipes…
                    </span>`
                  : html`<span style=${{ display:'flex', alignItems:'center', justifyContent:'center', gap:9 }}>
                      <span style=${{ fontSize:18 }}>👨‍🍳</span> Suggest Meals
                    </span>`
                }
              </button>
            </div>
          </div>

          <div>
            ${error && html`<div style=${{
              background:C.orangeBg, color:C.terra,
              border:`1px solid #F5D5C8`, borderRadius:12,
              padding:'13px 16px', fontSize:F.base, marginBottom:16,
            }}>⚠ ${error}</div>`}

            ${!loading && recipes.length===0 && !error && html`
              <div style=${{ textAlign:'center', paddingTop:100, paddingBottom:100 }}>
                <div style=${{ fontSize:64, marginBottom:16 }}>🥘</div>
                <h3 class="font-serif" style=${{ fontSize:F.xl, fontWeight:700, color:C.charcoal, marginBottom:9 }}>
                  What shall we cook today?
                </h3>
                <p style=${{ fontSize:F.md, color:C.bark, maxWidth:340, margin:'0 auto' }}>
                  Pick ingredients and preferences, then tap <strong>Suggest Meals</strong>.
                </p>
              </div>`}

            ${loading && html`
              <div style=${{ textAlign:'center', paddingTop:100, paddingBottom:100 }}>
                <div class="bounce" style=${{ fontSize:64, marginBottom:16 }}>👨‍🍳</div>
                <p class="font-serif" style=${{ fontSize:F.lg, fontWeight:700, color:C.charcoal }}>
                  Searching real recipes for ${today()}…
                </p>
                <p style=${{ fontSize:F.base, color:C.bark, marginTop:8 }}>
                  Matching your preferences and history
                </p>
              </div>`}

            ${!loading && recipes.length>0 && html`
              <div>
                <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
                  <h2 class="font-serif" style=${{ fontSize:F.xl, fontWeight:700, color:C.charcoal, margin:0 }}>Today's Picks</h2>
                  <span style=${{ fontSize:F.sm, color:C.bark }}>${recipes.length} recipes</span>
                </div>
                <div style=${{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:16, marginBottom:48 }}>
                  ${recipes.map(r => html`<${RecipeCard} key=${r.name} r=${r} onOpen=${setSelected}
                    bookmarked=${bookmarks.has(r.name)} onBookmark=${toggleBookmark}
                    fb=${feedback[r.name]} onFb=${handleFb} />`)}
                </div>

                ${grocery.length>0 && html`
                  <div>
                    <div style=${{ display:'flex', alignItems:'center', gap:16, marginBottom:16 }}>
                      <div style=${{ flex:1, height:1, background:C.border }}></div>
                      <div style=${{ display:'flex', alignItems:'center', gap:8,
                        background:'white', border:`1px solid ${C.border}`,
                        padding:'9px 18px', borderRadius:99 }}>
                        <span>🛒</span>
                        <span class="font-serif" style=${{ fontSize:F.md, fontWeight:600, color:C.charcoal }}>
                          With a quick grocery run
                        </span>
                      </div>
                      <div style=${{ flex:1, height:1, background:C.border }}></div>
                    </div>
                    <p style=${{ textAlign:'center', fontSize:F.sm, color:C.bark, marginBottom:16 }}>
                      These are just a few ingredients away
                    </p>
                    <div style=${{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))', gap:16 }}>
                      ${grocery.map(r => html`<${GroceryCard} key=${r.name} r=${r} onOpen=${setSelected} />`)}
                    </div>
                  </div>`}
              </div>`}
          </div>
        </div>`}

      ${tab==='saved' && html`
        <div>
          <h2 class="font-serif" style=${{ fontSize:F.xl, fontWeight:700, color:C.charcoal, marginBottom:20 }}>Saved Recipes</h2>
          ${savedList.length===0
            ? html`<div style=${{ textAlign:'center', paddingTop:100, paddingBottom:100 }}>
                <div style=${{ fontSize:64, marginBottom:16 }}>🔖</div>
                <h3 class="font-serif" style=${{ fontSize:F.xl, fontWeight:700, color:C.charcoal, marginBottom:9 }}>No saved recipes yet</h3>
                <p style=${{ fontSize:F.md, color:C.bark }}>Tap 🤍 on any recipe card to save it here.</p>
              </div>`
            : html`<div style=${{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))', gap:16 }}>
                ${savedList.map(r => html`<${RecipeCard} key=${r.name} r=${r} onOpen=${setSelected}
                  bookmarked onBookmark=${toggleBookmark}
                  fb=${feedback[r.name]} onFb=${handleFb} />`)}
              </div>`}
        </div>`}
    </div>

    ${selected && html`<${RecipeModal} r=${selected} onClose=${()=>setSelected(null)}
      bookmarked=${bookmarks.has(selected.name)} onBookmark=${toggleBookmark}
      fb=${feedback[selected.name]} onFb=${handleFb} />`}
  </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
